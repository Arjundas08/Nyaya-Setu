version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - MONGO_URI=${MONGO_URI}
      - INDIANKANOON_API_KEY=${INDIANKANOON_API_KEY}
      - BHASHINI_USER_ID=${BHASHINI_USER_ID}
      - BHASHINI_API_KEY=${BHASHINI_API_KEY}
      - BHASHINI_INFERENCE_KEY=${BHASHINI_INFERENCE_KEY}
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    restart: unless-stopped

  # Nginx reverse proxy (optional - for production with SSL)
